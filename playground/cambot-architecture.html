<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CamBot-Agent Architecture Explorer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d1117; --surface: #161b22; --surface2: #21262d; --border: #30363d;
    --text: #e6edf3; --text-dim: #8b949e; --text-bright: #f0f6fc;
    --blue: #58a6ff; --blue-dim: #1f6feb33; --green: #3fb950; --green-dim: #23883833;
    --orange: #d29922; --orange-dim: #9e6a0333; --red: #f85149; --red-dim: #da363333;
    --purple: #bc8cff; --purple-dim: #8957e533; --cyan: #39d2c0; --cyan-dim: #1b7c6d33;
    --radius: 8px; --font: system-ui, -apple-system, sans-serif; --mono: 'SF Mono', 'Cascadia Code', 'Consolas', monospace;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow: hidden; }

  /* Layout */
  .app { display: grid; grid-template-rows: 48px 1fr 220px; height: 100vh; }
  .topbar { display: flex; align-items: center; gap: 8px; padding: 0 16px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 10; }
  .topbar h1 { font-size: 15px; font-weight: 600; color: var(--text-bright); margin-right: 16px; white-space: nowrap; }
  .main-area { display: grid; grid-template-columns: 1fr 340px; overflow: hidden; }
  .canvas-wrap { position: relative; overflow: hidden; background: var(--bg); }
  .canvas-wrap svg { width: 100%; height: 100%; }
  .detail-panel { background: var(--surface); border-left: 1px solid var(--border); overflow-y: auto; padding: 16px; }
  .bottom-bar { background: var(--surface); border-top: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .bottom-header { display: flex; align-items: center; justify-content: space-between; padding: 8px 16px; border-bottom: 1px solid var(--border); flex-shrink: 0; }
  .bottom-header span { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .bottom-content { flex: 1; overflow-y: auto; padding: 12px 16px; font-family: var(--mono); font-size: 12px; line-height: 1.6; color: var(--text-dim); white-space: pre-wrap; }

  /* Buttons */
  .btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 13px; cursor: pointer; transition: all 0.15s; font-family: var(--font); }
  .btn:hover { border-color: var(--text-dim); background: var(--border); }
  .btn.active { border-color: var(--blue); background: var(--blue-dim); color: var(--blue); }
  .btn-sim { background: linear-gradient(135deg, #1f6feb, #8957e5); border: none; color: white; font-weight: 600; padding: 6px 18px; }
  .btn-sim:hover { opacity: 0.9; }
  .btn-sim:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy { background: var(--surface2); font-size: 12px; padding: 4px 12px; }
  .btn-copy.copied { border-color: var(--green); color: var(--green); }
  .spacer { flex: 1; }

  /* View tabs */
  .view-tabs { display: flex; gap: 4px; }

  /* Detail panel */
  .detail-panel h2 { font-size: 14px; font-weight: 600; color: var(--text-bright); margin-bottom: 12px; border-bottom: 1px solid var(--border); padding-bottom: 8px; }
  .detail-panel h3 { font-size: 12px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 8px; }
  .detail-section { margin-bottom: 16px; }
  .detail-item { padding: 8px 10px; background: var(--surface2); border-radius: var(--radius); margin-bottom: 6px; font-size: 12px; line-height: 1.5; }
  .detail-item .label { color: var(--text-dim); font-size: 11px; }
  .detail-item .value { color: var(--text); font-family: var(--mono); font-size: 11px; }
  .detail-item code { background: var(--bg); padding: 1px 5px; border-radius: 3px; font-family: var(--mono); font-size: 11px; color: var(--cyan); }
  .file-ref { color: var(--purple); font-family: var(--mono); font-size: 11px; display: block; margin-top: 4px; opacity: 0.8; }

  /* SVG styles */
  .node { cursor: pointer; transition: opacity 0.2s; }
  .node:hover { opacity: 0.85; }
  .node rect, .node .shape { transition: stroke-width 0.15s, filter 0.15s; }
  .node.selected rect, .node.selected .shape { stroke-width: 3; filter: drop-shadow(0 0 8px currentColor); }
  .node-label { font-family: system-ui, sans-serif; font-size: 12px; fill: var(--text-bright); pointer-events: none; font-weight: 600; }
  .node-sublabel { font-family: 'SF Mono', Consolas, monospace; font-size: 9px; fill: var(--text-dim); pointer-events: none; }
  .edge { stroke: var(--border); stroke-width: 1.5; fill: none; }
  .edge-label { font-family: system-ui, sans-serif; font-size: 9px; fill: var(--text-dim); }
  .group-box { fill: none; stroke: var(--border); stroke-width: 1; stroke-dasharray: 6,3; rx: 12; }
  .group-label { font-family: system-ui, sans-serif; font-size: 11px; fill: var(--text-dim); font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }

  /* Animation pulse */
  .pulse { animation: pulse 0.8s ease-out; }
  @keyframes pulse {
    0% { r: 6; opacity: 1; }
    100% { r: 24; opacity: 0; }
  }
  .flow-dot { fill: var(--cyan); }
  .flow-trail { stroke: var(--cyan); stroke-width: 2.5; opacity: 0.5; stroke-dasharray: 4,4; animation: dashFlow 0.6s linear infinite; }
  @keyframes dashFlow { to { stroke-dashoffset: -8; } }

  /* Priority badge on bus handlers */
  .priority-badge { font-family: 'SF Mono', Consolas, monospace; font-size: 9px; font-weight: 700; }

  /* Sim visited trail — nodes already visited glow dimly */
  .node.sim-visited rect { filter: drop-shadow(0 0 3px #39d2c044); }

  /* Legend */
  .legend { display: flex; gap: 16px; align-items: center; margin-left: 24px; }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text-dim); }
  .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  /* Status bar */
  .status { font-size: 11px; color: var(--text-dim); font-family: var(--mono); }
  .status .highlight { color: var(--cyan); }

  /* Empty state */
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: var(--text-dim); gap: 8px; }
  .empty-state .icon { font-size: 32px; opacity: 0.3; }
  .empty-state p { font-size: 13px; }

  /* Message Trace timeline */
  .trace-timeline { height: 100%; overflow-y: auto; padding: 24px 32px; }
  .trace-stage { display: grid; grid-template-columns: 180px 1fr; gap: 16px; position: relative; padding-bottom: 8px; cursor: pointer; }
  .trace-stage:hover .trace-json-panel { border-color: var(--text-dim); }
  .trace-stage.active .trace-json-panel { border-color: var(--cyan); box-shadow: 0 0 12px #39d2c033; }
  .trace-stage.active .trace-label { color: var(--cyan); }
  .trace-stage.visited .trace-label { color: var(--cyan); opacity: 0.6; }
  .trace-stage.visited .trace-json-panel { border-color: #39d2c044; }

  .trace-left { display: flex; flex-direction: column; align-items: flex-end; padding-top: 10px; position: relative; }
  .trace-step-num { font-family: var(--mono); font-size: 11px; color: var(--text-dim); background: var(--surface2); border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; margin-bottom: 4px; flex-shrink: 0; border: 1px solid var(--border); }
  .trace-stage.active .trace-step-num { border-color: var(--cyan); color: var(--cyan); background: var(--cyan-dim); }
  .trace-label { font-size: 13px; font-weight: 600; color: var(--text-bright); text-align: right; line-height: 1.3; }
  .trace-sublabel { font-size: 11px; color: var(--text-dim); font-family: var(--mono); text-align: right; margin-top: 2px; }

  .trace-json-panel { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 10px 14px; font-family: var(--mono); font-size: 11px; line-height: 1.6; overflow-x: auto; transition: border-color 0.15s, box-shadow 0.15s; white-space: pre; }
  .trace-json-panel .json-key { color: var(--text-dim); }
  .trace-json-panel .json-str { color: var(--green); }
  .trace-json-panel .json-num { color: var(--orange); }
  .trace-json-panel .json-bool { color: var(--purple); }
  .trace-json-panel .json-null { color: var(--text-dim); font-style: italic; }
  .trace-json-panel .json-new { color: var(--cyan); font-weight: 600; }
  .trace-json-panel .json-bracket { color: var(--text-dim); opacity: 0.6; }

  .trace-arrow { display: flex; align-items: center; gap: 8px; padding: 4px 0 4px 90px; }
  .trace-arrow-line { width: 2px; height: 20px; background: var(--border); margin-left: 90px; }
  .trace-arrow-label { font-size: 10px; color: var(--text-dim); font-family: var(--mono); padding: 2px 8px; background: var(--surface2); border-radius: 4px; margin-left: 8px; }
  .trace-stage.active + .trace-arrow .trace-arrow-line { background: var(--cyan); }

  .trace-connector { display: flex; align-items: center; padding: 0 0 0 180px; margin: -2px 0; }
  .trace-connector-line { width: 2px; height: 16px; background: var(--border); margin-left: 10px; }
  .trace-connector-text { font-size: 10px; color: var(--text-dim); font-family: var(--mono); padding: 1px 8px; background: var(--surface2); border-radius: 4px; margin-left: 10px; white-space: nowrap; }
  .trace-stage.active + .trace-connector .trace-connector-line { background: var(--cyan); }
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <h1>CamBot Architecture</h1>
    <div class="view-tabs" id="viewTabs"></div>
    <div class="legend" id="legend"></div>
    <div class="spacer"></div>
    <span class="status" id="statusText"></span>
    <button class="btn btn-sim" id="simBtn" onclick="simulateFlow()">Simulate Message</button>
  </div>
  <div class="main-area">
    <div class="canvas-wrap" id="canvasWrap">
      <svg id="diagram" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>
    <div class="detail-panel" id="detailPanel">
      <div class="empty-state">
        <div class="icon">&#9776;</div>
        <p>Click a component to inspect</p>
      </div>
    </div>
  </div>
  <div class="bottom-bar">
    <div class="bottom-header">
      <span>Architecture Summary</span>
      <button class="btn btn-copy" id="copyBtn" onclick="copyPrompt()">Copy</button>
    </div>
    <div class="bottom-content" id="promptOutput"></div>
  </div>
</div>

<script>
// ─── STATE ─────────────────────────────────────────────
const state = {
  view: 'full-flow',
  selected: null,
  simulating: false,
  simStep: -1,
};

// ─── DATA: COMPONENT DEFINITIONS ───────────────────────
const COLORS = {
  channel: { fill: '#1f6feb33', stroke: '#58a6ff', text: '#58a6ff' },
  bus:     { fill: '#23883833', stroke: '#3fb950', text: '#3fb950' },
  container: { fill: '#9e6a0333', stroke: '#d29922', text: '#d29922' },
  credential: { fill: '#da363333', stroke: '#f85149', text: '#f85149' },
  filesystem: { fill: '#8957e533', stroke: '#bc8cff', text: '#bc8cff' },
  socket:  { fill: '#1b7c6d33', stroke: '#39d2c0', text: '#39d2c0' },
};

const VIEWS = {
  'full-flow':  { label: 'Full Flow', description: 'End-to-end message journey through all components' },
  'filesystem': { label: 'Filesystem', description: 'How disk files become container templates' },
  'bus':        { label: 'Event Bus', description: 'Priority handler pipeline — click Simulate to walk through the cascade' },
  'socket':     { label: 'Socket/IPC', description: 'TCP transport between host and containers' },
  'credentials':{ label: 'Credentials', description: 'Auth paths and secret delivery' },
  'agent-spawn':{ label: 'Agent Spawn', description: 'Container creation and context assembly' },
  'message-trace':{ label: 'Message Trace', description: 'Watch JSON transform as "what is 2 + 2" flows through the system' },
};

const COMPONENTS = {
  // Channels
  'whatsapp': {
    type: 'channel', label: 'WhatsApp', sublabel: 'Baileys',
    file: 'src/channels/whatsapp.ts',
    detail: {
      description: 'WhatsApp channel using Baileys library for Web API connection.',
      mechanism: 'QR code auth → persistent session in store/auth/. Receives messages via Baileys event stream, emits InboundMessage to bus.',
      key_functions: ['connect() — QR auth + event binding', 'sendMessage(jid, text) — Baileys.sendMessage', 'ownsJid(jid) — checks WhatsApp JID format'],
      data_flow: 'Baileys socket → message event → InboundMessage { channel: "whatsapp", jid, content, timestamp }',
    }
  },
  'email': {
    type: 'channel', label: 'Email', sublabel: 'workspace-mcp',
    file: 'src/channels/email.ts',
    detail: {
      description: 'Email channel polling Gmail via Google Workspace MCP server.',
      mechanism: 'Polls workspace-mcp every 30s for unread emails. Sends via send_gmail_message MCP tool. Thread tracking for reply chains.',
      key_functions: ['pollEmails() — MCP search_gmail_messages', 'sendMessage() — MCP send_gmail_message', 'connect() — starts poll timer'],
      data_flow: 'MCP poll → parse emails → InboundMessage { channel: "email", jid: "email:sender@...", content }',
    }
  },
  'web': {
    type: 'channel', label: 'Web UI', sublabel: ':3100 HTTP+WS',
    file: 'src/channels/web.ts',
    detail: {
      description: 'Web channel with HTTP REST + WebSocket for real-time messaging.',
      mechanism: 'Express server on port 3100. WebSocket for persistent connections. CORS via WEB_ALLOWED_ORIGINS.',
      key_functions: ['POST /api/message — HTTP message send', 'WebSocket /api/ws — persistent bidirectional', 'GET /api/health — status check'],
      data_flow: 'HTTP POST or WS message → InboundMessage { channel: "web", jid: "web:ui", content }',
    }
  },
  'cli': {
    type: 'channel', label: 'CLI', sublabel: 'stdin/stdout',
    file: 'src/channels/cli.ts',
    detail: {
      description: 'Command-line channel for local development and testing.',
      mechanism: 'Reads from process.stdin, writes to process.stdout. Simple line-based protocol.',
      key_functions: ['readline interface — stdin parsing', 'sendMessage() — stdout.write'],
      data_flow: 'stdin line → InboundMessage { channel: "cli", jid: "cli:local", content }',
    }
  },
  'file-channel': {
    type: 'channel', label: 'File', sublabel: 'filesystem IPC',
    file: 'src/channels/file.ts',
    detail: {
      description: 'File-based channel for programmatic integration.',
      mechanism: 'Watches a directory for incoming message files. Writes response files.',
      key_functions: ['File watcher — polls for new .json files', 'sendMessage() — write response file'],
      data_flow: 'File appears → parse JSON → InboundMessage → response file written',
    }
  },

  // Bus
  'event-bus': {
    type: 'bus', label: 'Event Bus', sublabel: 'createMessageBus()',
    file: 'src/bus/create-app-bus.ts',
    detail: {
      description: 'Central reactive event bus. All inter-component communication flows through here.',
      mechanism: 'Priority-ordered handler registration. Middleware pipeline: dedup → injection scan → outbound guard → backpressure → journal.',
      key_functions: ['createAppBus() — composition root', 'bus.emit(event) — dispatch to handlers', 'bus.use(middleware) — register middleware', 'bus.on(EventType, handler, priority) — register handler'],
      data_flow: 'Event emitted → middleware pipeline → handlers by ascending priority → side effects',
      event_types: ['InboundMessage — from channels', 'OutboundMessage — from containers', 'ChatMetadata — channel discovery', 'TypingUpdate — typing indicators', 'TaskPrompt — scheduled tasks', 'AgentTelemetry — cost tracking', 'AgentError — failure notification'],
    }
  },
  'input-sanitizer': {
    type: 'bus', label: 'Input Sanitizer', sublabel: 'Priority 15',
    file: 'src/orchestrator/bus-handlers.ts',
    detail: {
      description: 'First handler in the pipeline. Strips null bytes, enforces message size limits.',
      mechanism: 'Runs at priority 15 (first). Cleans dangerous characters, truncates oversized messages.',
      key_functions: ['sanitize(content) — null bytes, control chars', 'enforceLimit(content, maxBytes) — truncation'],
      data_flow: 'InboundMessage → sanitize content → pass to next handler',
    }
  },
  'db-store': {
    type: 'bus', label: 'DB Store', sublabel: 'Priority 16/100',
    file: 'src/orchestrator/bus-handlers.ts',
    detail: {
      description: 'Persists messages to SQLite. Priority 16 for inbound, 100 for outbound.',
      mechanism: 'Writes to chat_messages table. Stores sender, content, timestamp, channel, JID.',
      key_functions: ['storeInbound (p16) — save user message', 'storeOutbound (p100) — save bot reply'],
      data_flow: 'Message event → INSERT INTO chat_messages → message available for history queries',
    }
  },
  'lifecycle-ingest': {
    type: 'bus', label: 'Lifecycle Ingest', sublabel: 'Priority 17',
    file: 'src/orchestrator/bus-handlers.ts',
    detail: {
      description: 'Feeds messages into the memory/lifecycle system for conversation tracking.',
      mechanism: 'Priority 17. Updates conversation state, triggers memory operations.',
      key_functions: ['ingestMessage() — feed to lifecycle system', 'updateConversationState() — track active conversations'],
      data_flow: 'InboundMessage → lifecycle system → conversation state updated',
    }
  },
  'agent-handler': {
    type: 'bus', label: 'Agent Handler', sublabel: 'Priority 20',
    file: 'src/orchestrator/bus-handlers.ts',
    detail: {
      description: 'Persistent agent handler. Claims messages for channels owned by persistent agents.',
      mechanism: 'Priority 20. Checks if JID maps to a registered persistent agent. If so, claims the message and prevents default routing.',
      key_functions: ['claimMessage() — check agent ownership', 'resolveAgent() — lookup in registry'],
      data_flow: 'InboundMessage → check agent registry → claim or pass through',
    }
  },
  'message-router': {
    type: 'bus', label: 'Message Router', sublabel: 'Priority 110',
    file: 'src/orchestrator/message-router.ts',
    detail: {
      description: 'Routes messages to containers. Tries socket first, falls back to queue for new spawn.',
      mechanism: 'Priority 110. Checks socket connections, formats messages, manages trigger patterns.',
      key_functions: ['routeMessage() — socket or enqueue', 'socketServer.hasConnection(folder) — check live socket', 'socketServer.send(folder, frame) — pipe to running container', 'queue.enqueueMessageCheck(jid) — trigger new container spawn'],
      data_flow: 'InboundMessage → check socket → pipe via TCP or enqueue → container receives message',
    }
  },
  'audit': {
    type: 'bus', label: 'Audit', sublabel: 'Priority 200',
    file: 'src/orchestrator/bus-handlers.ts',
    detail: {
      description: 'Final handler. Logs all events for security audit trail.',
      mechanism: 'Priority 200 (last). Writes structured audit records.',
      key_functions: ['auditLog() — structured security logging'],
      data_flow: 'Any event → audit record written',
    }
  },
  'middleware': {
    type: 'bus', label: 'Middleware', sublabel: 'dedup + guard + journal',
    file: 'src/bus/create-app-bus.ts',
    detail: {
      description: 'Bus middleware pipeline applied to all events before handlers.',
      mechanism: 'Runs in registration order on every event: dedup filter (10k LRU), injection scanner, outbound guard (rate limits + loop detection), backpressure monitor (warn at 500+ in-flight), event journal (SQLite persistence).',
      key_functions: ['createDedupFilter({ maxSize: 10000 }) — LRU duplicate detection', 'createInjectionScanner() — prompt injection detection', 'createOutboundGuard() — rate limits + loop prevention', 'createBackpressureMiddleware() — in-flight monitoring', 'createEventJournal(db) — persist all events to SQLite'],
      data_flow: 'Event → dedup → injection scan → outbound guard → backpressure check → journal → handlers',
    }
  },

  // Socket/IPC
  'socket-server': {
    type: 'socket', label: 'Socket Server', sublabel: ':9500 TCP',
    file: 'src/cambot-socket/server.ts',
    detail: {
      description: 'CambotSocketServer — TCP server on port 9500 for container IPC.',
      mechanism: 'One-time token registration (60s TTL) before spawn. Token consumed on handshake. Supersession: new container for same group replaces old connection.',
      key_functions: ['registerToken(group, token, opts) — pre-auth', 'handleHandshake(frame, socket) — validate + consume token', 'send(group, frame) — dispatch to container', 'hasConnection(group) — check live socket'],
      data_flow: 'Token registered → container connects → handshake → bidirectional frames',
      frame_types: ['HANDSHAKE / ACK / REJECT — authentication', 'MESSAGE_INPUT — host → container', 'OUTPUT — container → host (result, telemetry)', 'LOG — container → host (structured logs)', 'HEARTBEAT / PING / PONG — keep-alive', 'SESSION_CLOSE — force exit'],
    }
  },
  'socket-client': {
    type: 'socket', label: 'Socket Client', sublabel: 'agent-runner',
    file: 'agent-runner/src/cambot-socket-client.ts',
    detail: {
      description: 'Container-side TCP client. Connects to host socket server with exponential backoff.',
      mechanism: 'Retries: 100ms, 200ms, 400ms, 800ms, 1600ms, 3200ms. Sends handshake with one-time token. Receives MESSAGE_INPUT frames for new user messages.',
      key_functions: ['CambotSocketClient.connect(host, port, group, token) — with retries', 'request(frame, timeout) — send + await reply', 'waitForMessage() — block until MESSAGE_INPUT'],
      data_flow: 'TCP connect → handshake frame → ACK → wait for MESSAGE_INPUT → process → send OUTPUT',
    }
  },

  // Container / Agent
  'gateway': {
    type: 'container', label: 'Gateway Router', sublabel: 'Haiku classifier',
    file: 'src/agents/gateway-router.ts',
    detail: {
      description: 'Lightweight routing via Claude Haiku. No container — just an API call with forced tool_use.',
      mechanism: 'Haiku called with route tool constraint. Returns { action: delegate|respond, targetAgent, prompt }. Handoff sessions for conversation stickiness (1hr TTL).',
      key_functions: ['spawnViaGateway() — Haiku API call', 'route tool — forced tool_use', 'handoff_sessions table — session stickiness', 'extractAgentKeywords() — local scoring before LLM'],
      data_flow: 'Message → local keyword scoring → Haiku classify → delegate to target agent or respond directly',
    }
  },
  'spawner': {
    type: 'container', label: 'Agent Spawner', sublabel: 'PersistentAgentSpawner',
    file: 'src/agents/persistent-agent-spawner.ts',
    detail: {
      description: 'Spawns agent containers with full context assembly. Manages registry cache (60s TTL).',
      mechanism: 'Resolves agent from registry → builds context (assembleContextString) → resolves conversation (rotation/creation) → spawns Docker container with mounts + secrets.',
      key_functions: ['spawn(agent, prompt, callerGroup, timeout) — main entry', 'assembleContext() — builds identity + soul + tools + agents + heartbeat', 'resolveActiveConversation() — memory mode rotation', 'registryCache — 60s TTL, invalidated on mutation'],
      data_flow: 'Agent resolved → context assembled → conversation resolved → container spawned → output callback registered',
      memory_modes: ['ephemeral — wipe SDK memory every spawn', 'conversation-scoped — rotate after idle/size limit', 'persistent — same conversation indefinitely'],
    }
  },
  'container-runner': {
    type: 'container', label: 'Container Runner', sublabel: 'Docker spawn',
    file: 'src/container/runner.ts',
    detail: {
      description: 'Spawns Docker containers with precise mount architecture and stdin secret delivery.',
      mechanism: 'Builds volume mounts → registers socket token → spawns container → writes secrets to stdin → deletes secrets from memory. Entrypoint.sh does smart recompilation via source hashing.',
      key_functions: ['runContainerAgent() — main spawn function', 'buildMounts() — volume mount assembly', 'readSecrets(secretKeys) — env var extraction', 'registerOutputCallback() — streaming results'],
      data_flow: 'Spawn request → build mounts → register token → docker run → stdin secrets → entrypoint → agent-runner starts',
    }
  },
  'agent-runner': {
    type: 'container', label: 'Agent Runner', sublabel: 'in-container loop',

function highlightJson(text, diffKeys) {
  // Escape HTML
  let s = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

  // Highlight JSON syntax
  // Keys (quoted before colon)
  s = s.replace(/"([^"]+)"(\s*:)/g, (match, key, colon) => {
    const cls = diffKeys.includes(key) ? 'json-new' : 'json-key';
    return `<span class="${cls}">"${key}"</span>${colon}`;
  });

  // String values (quoted after colon, but not keys we already matched)
  s = s.replace(/:\s*"([^"]*(?:\\.[^"]*)*)"/g, (match, val) => {
    return `: <span class="json-str">"${val}"</span>`;
  });

  // Numbers
  s = s.replace(/:\s*(\d+(?:\.\d+)?)/g, (match, num) => {
    return `: <span class="json-num">${num}</span>`;
  });

  // Booleans
  s = s.replace(/:\s*(true|false)/g, (match, bool) => {
    return `: <span class="json-bool">${bool}</span>`;
  });

  // null
  s = s.replace(/:\s*(null)/g, ': <span class="json-null">null</span>');

  // Brackets
  s = s.replace(/([{}\[\]])/g, '<span class="json-bracket">$1</span>');

  // Comments (// ...)
  s = s.replace(/(\/\/.+)/g, '<span class="json-key" style="opacity:0.5;font-style:italic">$1</span>');

  return s;
}

function renderDiagram() {
  // Handle message-trace view separately
  if (state.view === 'message-trace') {
    renderMessageTrace();
    return;
  }

  // Hide timeline if switching away from trace view
  const timeline = document.getElementById('traceTimeline');
  if (timeline) timeline.style.display = 'none';
  const svg = document.getElementById('diagram');
  svg.style.display = '';

  const nodes = getViewNodes(state.view);
  const edges = getViewEdges(state.view);
  const groups = getViewGroups(state.view);

  // Calculate viewBox
  let maxX = 0, maxY = 0;
  nodes.forEach(n => { maxX = Math.max(maxX, n.x + n.w + 40); maxY = Math.max(maxY, n.y + n.h + 40); });
  groups.forEach(g => { maxX = Math.max(maxX, g.x + g.w + 20); maxY = Math.max(maxY, g.y + g.h + 20); });
  svg.setAttribute('viewBox', `0 0 ${Math.max(maxX, 900)} ${Math.max(maxY, 500)}`);

  let html = '<defs>';
  html += '<marker id="arrow" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 z" fill="#484f58"/></marker>';
  html += '<marker id="arrow-active" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 z" fill="#39d2c0"/></marker>';
  html += '<marker id="arrow-visited" viewBox="0 0 10 6" refX="10" refY="3" markerWidth="8" markerHeight="6" orient="auto"><path d="M0,0 L10,3 L0,6 z" fill="#39d2c044"/></marker>';
  html += '</defs>';

  // Track visited nodes for sim trail effect
  const steps = getSimSteps();
  const visitedNodes = new Set();
  if (state.simulating && state.simStep >= 0) {
    for (let i = 0; i < state.simStep; i++) visitedNodes.add(steps[i].node);
  }

  // Groups
  groups.forEach(g => {
    html += `<rect class="group-box" x="${g.x}" y="${g.y}" width="${g.w}" height="${g.h}" style="stroke:${g.color}40"/>`;
    html += `<text class="group-label" x="${g.x + 12}" y="${g.y + 18}" style="fill:${g.color}80">${g.label}</text>`;
  });

  // Edges
  const isBusView = state.view === 'bus';
  edges.forEach((e, i) => {
    const fromN = nodes.find(n => n.id === e.from);
    const toN = nodes.find(n => n.id === e.to);
    if (!fromN || !toN) return;
    const { sx, sy, ex, ey } = smartAnchors(fromN, toN);
    const isActive = state.simulating && state.simStep >= 0 && isEdgeInSimStep(e);
    const wasTraversed = state.simulating && visitedNodes.has(e.from) && visitedNodes.has(e.to);
    const cls = isActive ? 'edge flow-trail' : wasTraversed ? 'edge' : 'edge';
    const edgeStroke = isActive ? '' : wasTraversed ? ' stroke="#39d2c044" stroke-width="2"' : '';
    const marker = isActive ? 'url(#arrow-active)' : wasTraversed ? 'url(#arrow-visited)' : 'url(#arrow)';

    // Bus pipeline: straight vertical lines for the handler chain
    const isVerticalPipe = isBusView && Math.abs(fromN.x + fromN.w/2 - (toN.x + toN.w/2)) < 20;
    if (isVerticalPipe) {
      const mx = (fromN.x + fromN.w/2 + toN.x + toN.w/2) / 2;
      html += `<path class="${cls}"${edgeStroke} d="M${mx},${sy} L${mx},${ey}" marker-end="${marker}" data-edge="${i}"/>`;
      if (e.label) {
        html += `<text class="edge-label" x="${mx + 8}" y="${(sy+ey)/2}" dominant-baseline="middle">${e.label}</text>`;
      }
    } else {
      // Curved path for non-pipeline edges
      const dx = ex - sx, dy = ey - sy;
      const cx1 = sx + dx * 0.4, cy1 = sy;
      const cx2 = sx + dx * 0.6, cy2 = ey;
      html += `<path class="${cls}"${edgeStroke} d="M${sx},${sy} C${cx1},${cy1} ${cx2},${cy2} ${ex},${ey}" marker-end="${marker}" data-edge="${i}"/>`;
      if (e.label) {
        const mx = (sx + ex) / 2, my = (sy + ey) / 2 - 6;
        html += `<text class="edge-label" x="${mx}" y="${my}" text-anchor="middle">${e.label}</text>`;
      }
    }
  });

  // Priority badges for bus view handlers
  const BUS_PRIORITIES = {
    'input-sanitizer': 15, 'db-store': '16/100', 'lifecycle-ingest': 17,
    'agent-handler': 20, 'message-router': 110, 'audit': 200,
  };

  // Nodes
  nodes.forEach(n => {
    const comp = COMPONENTS[n.id];
    const c = COLORS[comp.type];
    const selected = state.selected === n.id;
    const simActive = state.simulating && state.simStep >= 0 && steps[state.simStep]?.node === n.id;
    const wasVisited = state.simulating && visitedNodes.has(n.id) && !simActive;
    const stroke = simActive ? '#39d2c0' : wasVisited ? '#39d2c066' : c.stroke;
    const fill = simActive ? '#39d2c033' : wasVisited ? '#39d2c011' : c.fill;
    const sw = selected ? 3 : simActive ? 2.5 : 1.5;
    const glow = (selected || simActive) ? `filter: drop-shadow(0 0 8px ${stroke})` : wasVisited ? `filter: drop-shadow(0 0 3px #39d2c044)` : '';
    html += `<g class="node ${selected ? 'selected' : ''} ${wasVisited ? 'sim-visited' : ''}" onclick="selectNode('${n.id}')" data-id="${n.id}">`;
    html += `<rect x="${n.x}" y="${n.y}" width="${n.w}" height="${n.h}" rx="8" fill="${fill}" stroke="${stroke}" stroke-width="${sw}" style="${glow}"/>`;
    html += `<text class="node-label" x="${n.x + n.w/2}" y="${n.y + (n.h > 50 ? 24 : 20)}" text-anchor="middle" fill="${simActive ? '#39d2c0' : wasVisited ? '#39d2c0aa' : c.text}">${comp.label}</text>`;
    if (comp.sublabel) {
      html += `<text class="node-sublabel" x="${n.x + n.w/2}" y="${n.y + (n.h > 50 ? 42 : 36)}" text-anchor="middle">${comp.sublabel}</text>`;
    }
    // Priority badge for bus view
    if (isBusView && BUS_PRIORITIES[n.id] !== undefined) {
      const bx = n.x + n.w - 4, by = n.y + 2;
      html += `<rect x="${bx - 22}" y="${by}" width="26" height="16" rx="4" fill="#3fb95022" stroke="#3fb95066" stroke-width="1"/>`;
      html += `<text class="priority-badge" x="${bx - 9}" y="${by + 12}" text-anchor="middle" fill="#3fb950">p${BUS_PRIORITIES[n.id]}</text>`;
    }
    html += '</g>';
    // Sim pulse
    if (simActive) {
      html += `<circle cx="${n.x + n.w/2}" cy="${n.y + n.h/2}" r="6" fill="none" stroke="#39d2c0" stroke-width="2" class="pulse"/>`;
    }
  });

  svg.innerHTML = html;
}

function smartAnchors(from, to) {
  const fcx = from.x + from.w/2, fcy = from.y + from.h/2;
  const tcx = to.x + to.w/2, tcy = to.y + to.h/2;
  const dx = tcx - fcx, dy = tcy - fcy;
  let sx, sy, ex, ey;
  if (Math.abs(dx) > Math.abs(dy)) {
    // Horizontal-dominant
    if (dx > 0) { sx = from.x + from.w; ex = to.x; }
    else { sx = from.x; ex = to.x + to.w; }
    sy = fcy; ey = tcy;
  } else {
    // Vertical-dominant
    if (dy > 0) { sy = from.y + from.h; ey = to.y; }
    else { sy = from.y; ey = to.y + to.h; }
    sx = fcx; ex = tcx;
  }
  return { sx, sy, ex, ey };
}

function isEdgeInSimStep(edge) {
  if (state.simStep < 0) return false;
  const steps = getSimSteps();
  const step = steps[state.simStep];
  const prev = state.simStep > 0 ? steps[state.simStep - 1] : null;
  return (prev && edge.from === prev.node && edge.to === step.node) ||
         (edge.from === step.node) || (edge.to === step.node);
}

function renderDetail() {
  const panel = document.getElementById('detailPanel');
  if (!state.selected) {
    panel.innerHTML = '<div class="empty-state"><div class="icon">&#9776;</div><p>Click a component to inspect</p></div>';
    return;
  }

  // Handle trace stage detail
  if (state.view === 'message-trace') {
    const stage = MESSAGE_TRACE_STAGES.find(s => s.id === state.selected);
    if (stage) {
      renderTraceDetail(panel, stage);
      return;
    }
  }

  const comp = COMPONENTS[state.selected];
  const c = COLORS[comp.type];
  let html = `<h2 style="color:${c.text}">${comp.label}</h2>`;
  html += `<span class="file-ref">${comp.file}</span>`;
  const d = comp.detail;
  if (d.description) {
    html += `<div class="detail-section"><div class="detail-item">${d.description}</div></div>`;
  }
  if (d.mechanism) {
    html += `<h3>How it works</h3><div class="detail-section"><div class="detail-item">${d.mechanism}</div></div>`;
  }
  if (d.key_functions) {
    html += '<h3>Key Functions</h3><div class="detail-section">';
    d.key_functions.forEach(f => {
      const [name, ...desc] = f.split(' — ');
      html += `<div class="detail-item"><code>${name}</code>${desc.length ? '<br><span class="label">' + desc.join(' — ') + '</span>' : ''}</div>`;
    });
    html += '</div>';
  }
  if (d.data_flow) {
    html += `<h3>Data Flow</h3><div class="detail-section"><div class="detail-item" style="font-family:var(--mono);font-size:11px;">${d.data_flow}</div></div>`;
  }
  if (d.event_types) {
    html += '<h3>Event Types</h3><div class="detail-section">';
    d.event_types.forEach(e => {
      const [name, ...desc] = e.split(' — ');
      html += `<div class="detail-item"><code>${name}</code>${desc.length ? ' <span class="label">' + desc.join(' — ') + '</span>' : ''}</div>`;
    });
    html += '</div>';
  }
  if (d.frame_types) {
    html += '<h3>Frame Types</h3><div class="detail-section">';
    d.frame_types.forEach(f => {
      const [name, ...desc] = f.split(' — ');
      html += `<div class="detail-item"><code>${name}</code>${desc.length ? ' <span class="label">' + desc.join(' — ') + '</span>' : ''}</div>`;
    });
    html += '</div>';
  }
  if (d.memory_modes) {
    html += '<h3>Memory Modes</h3><div class="detail-section">';
    d.memory_modes.forEach(m => {
      const [name, ...desc] = m.split(' — ');
      html += `<div class="detail-item"><strong>${name}</strong>${desc.length ? ' — ' + desc.join(' — ') : ''}</div>`;
    });
    html += '</div>';
  }
  // Show sim step info if active
  if (state.simulating && state.simStep >= 0) {
    const steps = getSimSteps();
    const step = steps[state.simStep];
    if (step.node === state.selected) {
      html += `<h3 style="color:#39d2c0">Simulation Step ${state.simStep + 1}/${steps.length}</h3>`;
      html += `<div class="detail-section"><div class="detail-item" style="border-left:3px solid #39d2c0;padding-left:12px"><strong>${step.msg}</strong><br><span class="label">${step.detail}</span></div></div>`;
    }
  }
  panel.innerHTML = html;
}

function renderTraceDetail(panel, stage) {
  const idx = MESSAGE_TRACE_STAGES.indexOf(stage);
  let html = `<h2 style="color:var(--cyan)">Stage ${idx + 1}: ${stage.label}</h2>`;
  html += `<span class="file-ref">${stage.file}</span>`;

  html += `<div class="detail-section"><div class="detail-item">${stage.description}</div></div>`;

  html += `<h3>TypeScript Type</h3>`;
  html += `<div class="detail-section"><div class="detail-item"><code>${stage.ts_type}</code></div></div>`;

  if (stage.diff_keys.length > 0) {
    html += `<h3>New / Changed Fields</h3><div class="detail-section">`;
    stage.diff_keys.forEach(k => {
      html += `<div class="detail-item"><code style="color:var(--cyan)">${k}</code></div>`;
    });
    html += `</div>`;
  }

  // Transform from previous
  if (idx > 0) {
    const prev = MESSAGE_TRACE_STAGES[idx - 1];
    html += `<h3>Transform</h3>`;
    html += `<div class="detail-section"><div class="detail-item" style="border-left:3px solid var(--cyan);padding-left:12px">`;
    html += `<span class="label">From:</span> ${prev.label}<br>`;
    html += `<span class="label">Change:</span> ${TRACE_TRANSFORMS[idx - 1] || 'shape preserved'}`;
    html += `</div></div>`;
  }

  // Transform to next
  if (idx < MESSAGE_TRACE_STAGES.length - 1) {
    const next = MESSAGE_TRACE_STAGES[idx + 1];
    html += `<h3>Next Stage</h3>`;
    html += `<div class="detail-section"><div class="detail-item">`;
    html += `<span class="label">To:</span> ${next.label}<br>`;
    html += `<span class="label">Change:</span> ${TRACE_TRANSFORMS[idx] || ''}`;
    html += `</div></div>`;
  }

  // Sim step info
  if (state.simulating && state.simStep >= 0) {
    const steps = getSimSteps();
    const step = steps[state.simStep];
    if (step && step.node === state.selected) {
      html += `<h3 style="color:var(--cyan)">Simulation Step ${state.simStep + 1}/${steps.length}</h3>`;
      html += `<div class="detail-section"><div class="detail-item" style="border-left:3px solid var(--cyan);padding-left:12px"><strong>${step.msg}</strong><br><span class="label">${step.detail}</span></div></div>`;
    }
  }

  panel.innerHTML = html;
}

function renderPrompt() {
  const el = document.getElementById('promptOutput');
  const view = VIEWS[state.view];
  let parts = [`View: ${view.label} — ${view.description}`];

  if (state.selected && state.view === 'message-trace') {
    const stage = MESSAGE_TRACE_STAGES.find(s => s.id === state.selected);
    if (stage) {
      const idx = MESSAGE_TRACE_STAGES.indexOf(stage);
      parts.push(`\nSelected: Stage ${idx + 1} — ${stage.label}`);
      parts.push(`File: ${stage.file}`);
      parts.push(`Type: ${stage.ts_type}`);
      parts.push(`${stage.description}`);
      parts.push(`\nJSON shape:\n${stage.json}`);
    }
  } else if (state.selected) {
    const comp = COMPONENTS[state.selected];
    parts.push(`\nSelected: ${comp.label} (${comp.type})`);
    parts.push(`File: ${comp.file}`);
    parts.push(`${comp.detail.description}`);
    if (comp.detail.mechanism) parts.push(`Mechanism: ${comp.detail.mechanism}`);
    if (comp.detail.data_flow) parts.push(`Data flow: ${comp.detail.data_flow}`);
  }

  if (state.simulating && state.simStep >= 0) {
    const steps = getSimSteps();
    const step = steps[state.simStep];
    parts.push(`\n--- Simulation Step ${state.simStep + 1}/${steps.length} ---`);
    parts.push(`Component: ${COMPONENTS[step.node]?.label || step.node}`);
    parts.push(`Action: ${step.msg}`);
    parts.push(`Detail: ${step.detail}`);
  }

  // Connected components summary (skip for trace view)
  if (state.view === 'message-trace') { el.textContent = parts.join('\n'); return; }
  const nodes = getViewNodes(state.view);
  const edges = getViewEdges(state.view);
  if (state.selected) {
    const connected = edges
      .filter(e => e.from === state.selected || e.to === state.selected)
      .map(e => {
        const other = e.from === state.selected ? e.to : e.from;
        const dir = e.from === state.selected ? '→' : '←';
        const otherComp = COMPONENTS[other];
        return `  ${dir} ${otherComp?.label || other}${e.label ? ' (' + e.label + ')' : ''}`;
      });
    if (connected.length) {
      parts.push(`\nConnections:`);
      parts.push(connected.join('\n'));
    }
  }

  el.textContent = parts.join('\n');
}

function updateStatus() {
  const el = document.getElementById('statusText');
  if (state.simulating) {
    const steps = getSimSteps();
    el.innerHTML = `Step <span class="highlight">${state.simStep + 1}</span>/${steps.length} — ${steps[state.simStep]?.msg || 'ready'}`;
  } else if (state.view === 'message-trace') {
    el.innerHTML = `${MESSAGE_TRACE_STAGES.length} stages`;
  } else {
    const nodes = getViewNodes(state.view);
    el.innerHTML = `${nodes.length} components`;
  }
}

// ─── ACTIONS ───────────────────────────────────────────
function setView(view) {
  state.view = view;
  state.selected = null;
  state.simulating = false;
  state.simStep = -1;
  document.getElementById('simBtn').disabled = false;
  render();
}

function selectNode(id) {
  state.selected = state.selected === id ? null : id;
  renderDetail();
  renderDiagram();
  renderPrompt();
}

let simTimer = null;
function simulateFlow() {
  const steps = getSimSteps();
  if (state.simulating) {
    // Advance step
    if (state.simStep < steps.length - 1) {
      state.simStep++;
      const step = steps[state.simStep];
      state.selected = step.node;
      // Auto-switch view if step node isn't in current view (skip for trace — all stages are in view)
      if (state.view !== 'message-trace') {
        const nodes = getViewNodes(state.view);
        if (!nodes.find(n => n.id === step.node)) {
          if (!VIEW_SIM_STEPS[state.view]) {
            state.view = 'full-flow';
          }
          renderTabs();
          renderLegend();
        }
      }
      render();
      // Auto-advance
      simTimer = setTimeout(simulateFlow, 1800);
    } else {
      // End simulation
      state.simulating = false;
      state.simStep = -1;
      document.getElementById('simBtn').textContent = 'Simulate Message';
      document.getElementById('simBtn').disabled = false;
      render();
    }
    return;
  }

  // Start simulation — use current view's steps if available, else switch to full-flow
  if (!VIEW_SIM_STEPS[state.view]) {
    state.view = 'full-flow';
  }
  const startSteps = getSimSteps();
  state.simulating = true;
  state.simStep = 0;
  state.selected = startSteps[0].node;
  document.getElementById('simBtn').textContent = 'Next Step';
  clearTimeout(simTimer);
  renderTabs();
  renderLegend();
  render();
  simTimer = setTimeout(simulateFlow, 2000);
}

function copyPrompt() {
  const text = document.getElementById('promptOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 1500);
  });
}

// Click on canvas background deselects
document.getElementById('canvasWrap').addEventListener('click', (e) => {
  const isBackground = e.target === document.getElementById('diagram') || e.target === document.getElementById('canvasWrap');
  const isTimeline = e.target === document.getElementById('traceTimeline');
  if (isBackground || isTimeline) {
    state.selected = null;
    renderDetail();
    renderDiagram();
    renderPrompt();
  }
});

// Stop auto-advance on manual interaction during sim
document.getElementById('simBtn').addEventListener('click', () => {
  clearTimeout(simTimer);
});

// ─── INIT ──────────────────────────────────────────────
render();
</script>
